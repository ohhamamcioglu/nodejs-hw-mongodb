tags:
  - Auth
summary: Register a new user
operationId: registerUser
description: Create a new user account with email and password.
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - name
          - email
          - password
        properties:
          name:
            type: string
            description: User's full name
            example: "John Doe"
          email:
            type: string
            format: email
            description: User's email address
            example: "john@example.com"
          password:
            type: string
            minLength: 6
            description: User's password (minimum 6 characters)
            example: "password123"
responses:
  '201':
    description: Successfully registered user
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: "Successfully registered a user!"
            data:
              type: object
              properties:
                _id:
                  type: string
                  example: "507f1f77bcf86cd799439011"
                name:
                  type: string
                  example: "John Doe"
                email:
                  type: string
                  example: "john@example.com"
                createdAt:
                  type: string
                  format: date-time
                  example: "2024-10-31T12:00:00.000Z"
                updatedAt:
                  type: string
                  format: date-time
                  example: "2024-10-31T12:00:00.000Z"
  '400':
    description: Bad request - Validation error
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: "Validation error"
            data:
              type: object
              example: {"email": "Email is required"}
  '409':
    description: Conflict - Email already in use
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 409
            message:
              type: string
              example: "Email in use"
            data:
              type: string
              example: "Email in use"