tags:
  - Contacts
summary: Create a new contact
operationId: createContact
description: Create a new contact with optional photo upload. Requires authentication.
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        required:
          - name
          - phoneNumber
          - contactType
        properties:
          name:
            type: string
            description: Contact's full name
            example: "John Doe"
          phoneNumber:
            type: string
            description: Contact's phone number
            example: "+1234567890"
          email:
            type: string
            format: email
            description: Contact's email address
            example: "john@example.com"
          isFavourite:
            type: boolean
            description: Whether the contact is marked as favourite
            default: false
            example: true
          contactType:
            type: string
            enum: [work, home, personal]
            description: Type of contact
            default: personal
            example: "work"
          photo:
            type: string
            format: binary
            description: Contact's photo file (JPEG, PNG)
    application/json:
      schema:
        type: object
        required:
          - name
          - phoneNumber
          - contactType
        properties:
          name:
            type: string
            description: Contact's full name
            example: "John Doe"
          phoneNumber:
            type: string
            description: Contact's phone number
            example: "+1234567890"
          email:
            type: string
            format: email
            description: Contact's email address
            example: "john@example.com"
          isFavourite:
            type: boolean
            description: Whether the contact is marked as favourite
            default: false
            example: true
          contactType:
            type: string
            enum: [work, home, personal]
            description: Type of contact
            default: personal
            example: "work"
responses:
  '201':
    description: Successfully created contact
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: "Successfully created a contact!"
            data:
              type: object
              properties:
                _id:
                  type: string
                  example: "507f1f77bcf86cd799439011"
                name:
                  type: string
                  example: "John Doe"
                phoneNumber:
                  type: string
                  example: "+1234567890"
                email:
                  type: string
                  example: "john@example.com"
                isFavourite:
                  type: boolean
                  example: false
                contactType:
                  type: string
                  enum: [work, home, personal]
                  example: "work"
                photo:
                  type: string
                  example: "https://res.cloudinary.com/demo/image/upload/v1698765432/contacts/photo.jpg"
                userId:
                  type: string
                  example: "507f1f77bcf86cd799439012"
                createdAt:
                  type: string
                  format: date-time
                  example: "2024-10-31T12:00:00.000Z"
                updatedAt:
                  type: string
                  format: date-time
                  example: "2024-10-31T12:00:00.000Z"
  '400':
    description: Bad request - Validation error
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: "Validation error"
            data:
              type: object
              example: {"name": "Name is required"}
  '401':
    description: Unauthorized - Invalid or missing authentication
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: "Unauthorized"
            data:
              type: string
              example: "Unauthorized"