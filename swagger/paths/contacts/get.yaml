tags:
  - Contacts
summary: Get all contacts
operationId: getAllContacts
description: Retrieve all contacts for the authenticated user with optional filtering and pagination.
security:
  - bearerAuth: []
parameters:
  - name: page
    in: query
    required: false
    description: Page number for pagination
    schema:
      type: integer
      minimum: 1
      default: 1
      example: 1
  - name: perPage
    in: query
    required: false
    description: Number of contacts per page
    schema:
      type: integer
      minimum: 1
      maximum: 100
      default: 10
      example: 10
  - name: sortBy
    in: query
    required: false
    description: Field to sort by
    schema:
      type: string
      enum: [name, email, phoneNumber, contactType, isFavourite, createdAt, updatedAt]
      default: createdAt
      example: name
  - name: sortOrder
    in: query
    required: false
    description: Sort order
    schema:
      type: string
      enum: [asc, desc]
      default: asc
      example: asc
  - name: contactType
    in: query
    required: false
    description: Filter by contact type
    schema:
      type: string
      enum: [work, home, personal]
      example: work
  - name: isFavourite
    in: query
    required: false
    description: Filter by favourite status
    schema:
      type: boolean
      example: true
responses:
  '200':
    description: Successfully retrieved contacts
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: "Successfully found contacts!"
            data:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "507f1f77bcf86cd799439011"
                      name:
                        type: string
                        example: "John Doe"
                      phoneNumber:
                        type: string
                        example: "+1234567890"
                      email:
                        type: string
                        example: "john@example.com"
                      isFavourite:
                        type: boolean
                        example: false
                      contactType:
                        type: string
                        enum: [work, home, personal]
                        example: "work"
                      photo:
                        type: string
                        example: "https://res.cloudinary.com/demo/image/upload/v1698765432/contacts/photo.jpg"
                      userId:
                        type: string
                        example: "507f1f77bcf86cd799439012"
                      createdAt:
                        type: string
                        format: date-time
                        example: "2024-10-31T12:00:00.000Z"
                      updatedAt:
                        type: string
                        format: date-time
                        example: "2024-10-31T12:00:00.000Z"
                page:
                  type: integer
                  example: 1
                perPage:
                  type: integer
                  example: 10
                totalItems:
                  type: integer
                  example: 25
                totalPages:
                  type: integer
                  example: 3
                hasNextPage:
                  type: boolean
                  example: true
                hasPreviousPage:
                  type: boolean
                  example: false
  '401':
    description: Unauthorized - Invalid or missing authentication
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: "Unauthorized"
            data:
              type: string
              example: "Unauthorized"