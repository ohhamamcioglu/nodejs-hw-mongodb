tags:
  - Contacts
summary: Get contact by ID
operationId: getContactById
description: Retrieve a specific contact by its ID. Requires authentication.
security:
  - bearerAuth: []
parameters:
  - name: contactId
    in: path
    required: true
    description: The ID of the contact to retrieve
    schema:
      type: string
      format: mongodb-objectid
      example: "507f1f77bcf86cd799439011"
responses:
  '200':
    description: Successfully retrieved contact
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: "Successfully found contact with id 507f1f77bcf86cd799439011!"
            data:
              type: object
              properties:
                _id:
                  type: string
                  example: "507f1f77bcf86cd799439011"
                name:
                  type: string
                  example: "John Doe"
                phoneNumber:
                  type: string
                  example: "+1234567890"
                email:
                  type: string
                  example: "john@example.com"
                isFavourite:
                  type: boolean
                  example: false
                contactType:
                  type: string
                  enum: [work, home, personal]
                  example: "work"
                photo:
                  type: string
                  example: "https://res.cloudinary.com/demo/image/upload/v1698765432/contacts/photo.jpg"
                userId:
                  type: string
                  example: "507f1f77bcf86cd799439012"
                createdAt:
                  type: string
                  format: date-time
                  example: "2024-10-31T12:00:00.000Z"
                updatedAt:
                  type: string
                  format: date-time
                  example: "2024-10-31T12:00:00.000Z"
  '401':
    description: Unauthorized - Invalid or missing authentication
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: "Unauthorized"
            data:
              type: string
              example: "Unauthorized"
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: "Contact not found"
            data:
              type: string
              example: "Contact not found"