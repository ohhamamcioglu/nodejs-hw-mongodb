openapi: 3.1.0
info:
  version: 1.0.0
  title: Node.js MongoDB API - hw6-email-and-images
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  description: >
    A comprehensive API for managing contacts with authentication, email services, and photo upload capabilities.
    Built with Node.js, Express, MongoDB, and integrated with Brevo email service and Cloudinary for image management.
tags:
  - name: Contacts
    description: Contact management operations
  - name: Auth
    description: Authentication and user management
servers:
  - url: http://localhost:3001
    description: Development server
  - url: https://nodejs-hw-mongodb-0xyb.onrender.com
    description: Production server
paths:
  /contacts:
    get:
      $ref: '../swagger/paths/contacts/get.yaml'
    post:
      $ref: '../swagger/paths/contacts/post.yaml'
  /contacts/{contactId}:
    get:
      $ref: '../swagger/paths/contacts/{id}/get.yaml'
    patch:
      $ref: '../swagger/paths/contacts/{id}/patch.yaml'
    delete:
      $ref: '../swagger/paths/contacts/{id}/delete.yaml'
  /auth/register:
    post:
      $ref: '../swagger/paths/auth/register.yaml'
  /auth/login:
    post:
      $ref: '../swagger/paths/auth/login.yaml'
  /auth/send-reset-email:
    post:
      $ref: '../swagger/paths/auth/send-reset-email.yaml'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
